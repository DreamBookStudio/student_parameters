<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Parameter Mirror — Test Battery</title>
<style>
/* ============ design tokens — mirrors app/tutor.html ============ */
:root{
  --bg:#faf7f0;          /* bone */
  --side:#f0ebdd;        /* deeper bone */
  --card:#ffffff;
  --card2:#f5f1e6;
  --border:#e2dbc8;
  --border2:#d3cab2;
  --text:#31301f;
  --muted:#8a8368;
  --accent:#5f6f3d;      /* olive */
  --accent-dk:#4c5a30;
  --accent-lt:#eef0e2;
  --green:#4a7c59; --amber:#a97e12; --red:#b3492e; --ok:#4a7c59; --bad:#b3492e; --warn:#a97e12; --acc:#5f6f3d; --tx2:#8a8368; --tx3:#8a8368; --line:#e2dbc8; --bg2:#f5f1e6; --card2:#f5f1e6;
  --plum:#7a6880;        /* self-report grade */
  --hover:#e9e3d2;
  --shadow:0 1px 3px rgba(60,55,30,.08),0 4px 16px rgba(60,55,30,.06);
  --ink:#31301f;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--text);display:flex;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;font-size:15px;line-height:1.5}
::selection{background:var(--accent-lt)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:5px}
::-webkit-scrollbar-track{background:transparent}

/* ============ sidebar (stage rail) ============ */
aside{width:272px;min-width:272px;background:var(--side);border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh}
.side-top{padding:16px 14px 8px}
.brand{display:flex;align-items:center;gap:9px;padding:2px 6px 12px;font-weight:700;font-size:15px;color:var(--accent-dk)}
.brand .logo{width:26px;height:26px;border-radius:8px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px}
.brand .sub{display:block;font-size:10.5px;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.nav-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:8px 20px 4px}
#stageNav{flex:1;overflow-y:auto;padding:2px 14px 10px}
.navitem{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;font-size:13.5px;color:var(--text);user-select:none;margin-bottom:1px}
.navitem .st{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;flex-shrink:0;border:1.5px solid var(--border2);color:transparent;background:var(--card)}
.navitem .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.navitem .cnt{margin-left:auto;font-size:11px;color:var(--muted)}
.navitem.done{color:var(--muted)}
.navitem.done .st{background:var(--accent);border-color:var(--accent);color:#fff}
.navitem.done .nm{text-decoration:none}
.navitem.current{background:var(--accent-lt);color:var(--accent-dk);font-weight:600}
.navitem.current .st{border-color:var(--accent);color:var(--accent);background:var(--card)}
.navitem.current .st::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--accent);display:block;animation:pulse 1.6s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.navitem.future{opacity:.45}
.navitem.locked .st{background:var(--card2)}
.side-foot{padding:12px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.hpanel{background:var(--bg);border:1px solid var(--border2);border-radius:9px;padding:9px 10px;font-size:11.5px;color:var(--muted);line-height:1.55}
.hpanel b{color:var(--accent-dk)}

/* ============ main ============ */
main{flex:1;height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative}
.main-top{display:flex;align-items:center;gap:10px;padding:12px 26px;border-bottom:1px solid var(--border);background:var(--bg);min-height:52px}
.main-top .ttl{font-size:14px;font-weight:700;color:var(--accent-dk)}
.chip{font-size:11.5px;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:3px 11px;color:var(--muted);white-space:nowrap}
.chip b{color:var(--accent-dk)}
.chip.risk{background:#f7e8e3;border-color:#e4c4b8;color:var(--red)}
.chip.ok{background:var(--accent-lt);border-color:var(--border2);color:var(--accent-dk)}
.spacer{flex:1}
#progressWrap{height:3px;background:var(--card2);overflow:hidden}
#progressBar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .4s}
#mainScroll{flex:1;overflow-y:auto}
#screen{max-width:820px;margin:0 auto;padding:26px 28px 90px}

/* ============ cards & type ============ */
.card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:22px 24px;margin-bottom:14px;box-shadow:var(--shadow)}
.card h2{font-size:20px;font-weight:700;margin:0 0 6px}
.card h3{font-size:15.5px;font-weight:700;margin:0 0 6px}
.muted{color:var(--muted);font-size:13.5px}
.tiny{color:var(--muted);font-size:12px}
ul.muted{padding-left:20px}
ul.muted li{margin:3px 0}
.btn{display:inline-block;background:var(--accent);color:#fff;border:none;border-radius:10px;
  padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;user-select:none}
.btn:hover{background:var(--accent-dk)}
.btn:active{transform:scale(.98)}
.btn.sec{background:var(--card);color:var(--accent-dk);border:1px solid var(--border2)}
.btn.sec:hover{background:var(--accent-lt)}
.btn.big{font-size:16px;padding:14px 30px}
.btn.ghost{background:transparent;border:1px dashed var(--border2);color:var(--muted)}
.btn.ghost:hover{color:var(--text);background:var(--hover)}
.btn:disabled{opacity:.4;cursor:default}
.btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;justify-content:center}
input[type=text]{background:var(--card);border:1px solid var(--border2);color:var(--text);
  border-radius:9px;padding:10px 13px;font-size:14px;width:100%;max-width:340px}
input[type=text]:focus{outline:none;border-color:var(--accent)}
select{background:var(--card);color:var(--text);border:1px solid var(--border2);border-radius:8px;padding:7px 10px;font-size:13px}

/* ============ item chrome ============ */
#itemTimer{height:3px;background:var(--card2);border-radius:2px;margin:0 0 16px;overflow:hidden}
#itemTimerBar{height:100%;width:100%;background:var(--accent)}
.stim{display:flex;justify-content:center;align-items:center;min-height:120px;margin:10px 0}
.bigdigit{font-size:92px;font-weight:700;text-align:center;font-variant-numeric:tabular-nums;color:var(--text)}
.prompt{font-size:17px;text-align:center;margin:8px 0 4px;font-weight:600}
.qtext{font-size:16.5px;margin:6px 0 12px;line-height:1.6}
.opts{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:12px}
.opts.wide{grid-template-columns:1fr 1fr}
.opt{background:var(--card);border:1px solid var(--border2);border-radius:11px;padding:13px 10px;
  text-align:center;cursor:pointer;font-size:15.5px;user-select:none;box-shadow:var(--shadow)}
.opt:hover{border-color:var(--accent);background:var(--accent-lt)}
.opt.svgopt{padding:8px}
.opt.sel{border-color:var(--accent);background:var(--accent-lt)}
.opt.correct{border-color:var(--green);background:#e9f2ec;box-shadow:none}
.opt.wrong{border-color:var(--red);background:#f7e8e3;box-shadow:none}
.centerc{text-align:center}
.skiprow{display:flex;justify-content:flex-end;margin-top:10px}
.feedback{font-size:14.5px;text-align:center;min-height:22px;margin-top:10px;font-weight:600}
.svgcell{background:var(--card2);border-radius:10px}
.glyphbox{display:flex;flex-direction:column;align-items:center;gap:6px}
.pairword{font-size:23px;font-weight:700;color:var(--accent-dk)}
.divider{border:none;border-top:1px solid var(--border);margin:18px 0}

/* confidence overlay */
#confOverlay{position:fixed;inset:0;background:rgba(49,48,31,.35);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(2px)}
#confOverlay .cbox{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 26px;text-align:center;box-shadow:var(--shadow)}
#confOverlay .cbox>div:first-child{font-size:16px;font-weight:700}
.confbtns{display:flex;gap:10px;margin-top:14px}
.confbtns .btn{min-width:72px;padding:12px 10px}

/* keypads & grids */
.keypad{display:grid;grid-template-columns:repeat(3,84px);gap:9px;justify-content:center;margin-top:12px}
.keypad .opt{font-size:20px;padding:14px 0}
.recallline{font-size:24px;letter-spacing:8px;text-align:center;min-height:36px;font-variant-numeric:tabular-nums;
  border-bottom:2px solid var(--border2);max-width:340px;margin:6px auto 4px;padding-bottom:6px;color:var(--accent-dk);font-weight:700}
.lettergrid{display:grid;grid-template-columns:repeat(4,84px);gap:9px;justify-content:center;margin-top:12px}

/* sprint */
.maprow{display:flex;gap:14px;justify-content:center;background:var(--card2);border:1px solid var(--border);
  border-radius:11px;padding:10px;margin-bottom:14px;position:sticky;top:0;z-index:2}
.mapcell{text-align:center}
.mapcell .d{font-size:17px;font-weight:700;color:var(--accent-dk)}
.symbtns{display:grid;grid-template-columns:repeat(4,minmax(70px,110px));gap:12px;justify-content:center;margin-top:16px}
#sartTap{width:min(420px,90%);margin:18px auto 0;display:block;padding:24px 0;font-size:18px}

/* number line */
.nlwrap{margin:26px 8px}
.nline{position:relative;height:64px;cursor:crosshair}
.nline .bar{position:absolute;left:0;right:0;top:30px;height:4px;background:var(--border2);border-radius:2px}
.nline .end{position:absolute;top:20px;width:2px;height:24px;background:var(--text)}
.nline .elab{position:absolute;top:48px;font-size:13px;color:var(--muted);transform:translateX(-50%)}
.nline .mark{position:absolute;top:14px;width:3px;height:36px;background:var(--accent);transform:translateX(-1px);border-radius:2px}

/* likert */
.scalesec{margin-bottom:22px}
.likert{border-top:1px solid var(--border);padding:13px 2px}
.likert .it{font-size:14.5px;margin-bottom:9px}
.lrow{display:flex;gap:6px;flex-wrap:wrap}
.lrow .lopt{flex:1;min-width:52px;background:var(--card);border:1px solid var(--border2);border-radius:9px;
  padding:7px 4px;font-size:11.5px;text-align:center;cursor:pointer;color:var(--muted)}
.lrow .lopt:hover{border-color:var(--accent)}
.lrow .lopt.sel{border-color:var(--accent);color:var(--accent-dk);background:var(--accent-lt);font-weight:600}
.lrow .lopt b{font-size:13px}

/* ============ results ============ */
.hero{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dk) 100%);color:#fff;border:none;
  border-radius:16px;padding:26px 28px;margin-bottom:14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.hero::after{content:"◈";position:absolute;right:-14px;top:-34px;font-size:150px;opacity:.08}
.hero h2{font-size:24px;font-weight:800;margin:0 0 2px;color:#fff}
.hero .hsub{font-size:13px;opacity:.85}
.statrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:18px}
.stat{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:11px;padding:10px 14px}
.stat .v{font-size:19px;font-weight:800}
.stat .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;opacity:.8}
.resgrid{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:820px){.resgrid{grid-template-columns:5fr 4fr}}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:8px;justify-content:center}
.legend .sw{display:inline-block;width:18px;height:0;border-top:3px solid;vertical-align:middle;margin-right:5px;border-radius:2px}
.banner{background:#faf3e2;border:1px solid #e8d9ae;color:#7c6317;border-radius:11px;padding:10px 14px;font-size:13px;margin-bottom:14px}
.riskbanner{background:#f7e8e3;border:1px solid #e4c4b8;color:var(--red);border-radius:11px;padding:12px 14px;font-size:13.5px;margin:10px 0;line-height:1.55}
.sumline{border-left:3px solid var(--accent);padding:9px 13px;margin:10px 0;background:var(--card2);border-radius:0 10px 10px 0;font-size:13.5px;line-height:1.55}
.sumline.leak{border-color:var(--amber);background:#faf3e2}
.sumline.strength{border-color:var(--green);background:#e9f2ec}
.sumline b{display:block;margin-bottom:2px}
.axisrow{display:flex;align-items:center;gap:12px;padding:11px 2px;border-top:1px solid var(--border)}
.axisrow:first-of-type{border-top:none}
.axisrow .acode{font-size:10.5px;font-weight:700;color:var(--accent-dk);background:var(--accent-lt);padding:2px 8px;border-radius:6px;min-width:34px;text-align:center}
.axisrow .aname{font-size:13.5px;font-weight:600;min-width:150px;flex:1}
.axisrow .aname .agrade{display:block;font-size:10.5px;font-weight:600;color:var(--muted)}
.meter{flex:2;height:10px;background:var(--card2);border:1px solid var(--border);border-radius:6px;position:relative;min-width:120px}
.meter .fill{position:absolute;left:0;top:0;bottom:0;border-radius:5px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .8s ease}
.meter .mid{position:absolute;left:50%;top:-3px;bottom:-3px;width:1px;background:var(--border2)}
.axisrow .aband{font-size:15px;font-weight:800;color:var(--accent-dk);min-width:26px;text-align:right}
.axisimp{font-size:12.5px;color:var(--muted);margin:-4px 0 8px 58px;line-height:1.5}
.dettable{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:8px}
.dettable th,.dettable td{border:1px solid var(--border);padding:6px 8px;text-align:left}
.dettable th{background:var(--card2);color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.flagchip{display:inline-block;background:#faf3e2;border:1px solid #e8d9ae;border-radius:20px;padding:1px 8px;font-size:10.5px;color:#7c6317;margin:1px 2px}
.pill{display:inline-block;border:1px solid var(--border2);background:var(--card2);border-radius:20px;padding:4px 12px;font-size:12.5px;margin:2px;color:var(--text)}
.pill b{color:var(--accent-dk)}
.gauge{margin:6px auto;display:block}
.fadein{animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
#fsHint{position:fixed;bottom:10px;right:14px;font-size:11px;color:var(--muted);z-index:5}

/* ============ responsive ============ */
@media(max-width:860px){
  body{flex-direction:column}
  aside{width:100%;min-width:0;height:auto;border-right:none;border-bottom:1px solid var(--border);flex-direction:row;align-items:center}
  .side-top{padding:8px 10px}
  .brand{padding:0}.brand .sub{display:none}
  .nav-label,.side-foot{display:none}
  #stageNav{display:flex;flex-direction:row;overflow-x:auto;padding:8px 10px;gap:4px}
  .navitem{padding:5px 8px;font-size:12px}
  .navitem .nm,.navitem .cnt{display:none}
  .navitem.current .nm{display:block}
  main{height:auto;flex:1}
  #screen{padding:16px 14px 70px}
}
</style>
</head>

  "A1": {
   "name": "Fluid Reasoning",
   "grade": "F",
   "malleable": false,
   "low": "Novel multi-step problems are costly right now — set strategy around this: worked examples first, pattern drilling, templates, scaffolding faded slowly.",
   "mid": "Handles grade-level novel problems with normal support. Standard problem-solving instruction with hints available.",
   "high": "Rapidly infers rules and transfers to new contexts. Skip to challenging novel problems quickly; minimal hand-holding.",
   "strength": "Novel, multi-concept problems are your engine — lean into JEE-Advanced-style questions early.",
   "leak": "Don't brute-force novelty: build a template library and drill patterns — strategy beats raw struggle here."
  },
  "A2": {
   "name": "Working Memory",
   "grade": "F",
   "malleable": false,
   "low": "Steps drop mid-problem. Externalise everything: micro-steps, written intermediates, one idea at a time, frequent recaps.",
   "mid": "Holds typical multi-step problems. Standard pacing.",
   "high": "Juggles many elements mentally — long multi-step chains are fine with less externalisation.",
   "strength": "You can carry long solution chains in your head — use it for multi-constraint problems.",
   "leak": "Write intermediate results down — losing a held value mid-chain is your most likely error mode."
  },
  "A3": {
   "name": "Processing Speed",
   "grade": "F",
   "malleable": false,
   "low": "Slow ≠ weak — accuracy-first strategy. Learn time-triage: bank the fast marks, park the slow ones, never rush the method.",
   "mid": "Age-typical fluency. Standard timed practice.",
   "high": "Fast, fluent scanning and retrieval — rapid-fire drills and timed mocks play to strength.",
   "strength": "Speed is a weapon: high attempt-rates are available to you — pair it with calibration so it doesn't leak marks.",
   "leak": "Time pressure costs you attempts. Triage ruthlessly and separate speed from accuracy in practice."
  },
  "A4": {
   "name": "Learning Efficiency / Retrieval",
   "grade": "F",
   "malleable": true,
   "low": "Needs many exposures to retain — switch to spaced retrieval, mnemonics, and low-stakes recall checks inside every session.",
   "mid": "Typical acquisition and retention. Standard review cadence.",
   "high": "Acquires and retains quickly — compress review cycles, move faster, enrich rather than repeat.",
   "strength": "You encode fast and keep it — volume subjects (NEET Bio, inorganic) are a scoring opportunity.",
   "leak": "Retention is the lever: spaced retrieval practice will buy you more marks per hour than more reading."
  },
  "A5": {
   "name": "Attentional Control",
   "grade": "S",
   "malleable": true,
   "low": "Focus lapses cause errors skill doesn't explain. Chunk study into short blocks with active checkpoints and minimal distractors.",
   "mid": "Sustains attention for typical periods. Standard session length.",
   "high": "Sustains focus through long, complex work — extended deep-work blocks are fine.",
   "strength": "Long papers won't wear you down — you can hold quality attention across a full 3-hour sitting.",
   "leak": "Lapses, not ability, are leaking marks — shorter chunks, active checkpoints, and deliberate re-focus rituals."
  },
  "C1": {
   "name": "Number Sense / Mental Math",
   "grade": "F",
   "malleable": true,
   "low": "Build magnitude sense explicitly: estimation tricks, order-of-magnitude checks, number-line intuition before procedures.",
   "mid": "Typical number sense. Keep estimation in the toolkit.",
   "high": "Sharp magnitude intuition — use estimation-first approaches to eliminate options and sanity-check fast.",
   "strength": "You can kill wrong options by estimation before solving — a direct speed and accuracy edge in MCQs.",
   "leak": "Sanity-check answers by order of magnitude — silly numeric slips are cheap to prevent here."
  },
  "C2": {
   "name": "Spatial Ability",
   "grade": "F",
   "malleable": true,
   "low": "Trainable (training effect g ≈ 0.47): sketching, rotation practice, manipulatives. Pair every verbal explanation with a slow, step-by-step diagram.",
   "mid": "Typical spatial skill. Include diagrams routinely.",
   "high": "Strong visualisation — lean on diagrams, geometric intuition and visual arguments; a real STEM strength.",
   "strength": "3D geometry, vectors, rotational mechanics, stereochemistry — visual arguments are your fast lane.",
   "leak": "Spatial skill is the most trainable axis here — 10 minutes of rotation/sketching practice daily moves it."
  },
  "D1": {

   "malleable": true,
   "low": "Intuitive-but-wrong answers slip through. Build a checking ritual into every solution; flag classic trap patterns before starting.",
   "mid": "Typical control. Keep a light final-check habit.",
   "high": "Reliable self-checker — rarely falls for designed distractors.",
   "strength": "Trap questions are where you gain rank — others donate negatives there; you don't.",
   "leak": "'Silly mistakes' are a designed leak: slow down at the last step and re-read what was actually asked."

   "strength": "You already study like a self-regulated learner — autonomy and open-ended goals will accelerate you.",

   "high": "Confident under challenge — can be pushed hard without denting motivation.",
   "strength": "You believe you can crack hard things — that belief buys persistence when problems fight back.",
   "leak": "Low self-efficacy quits early even when ability is there — stack small wins before hard sets."

const SHAPE_PTS = {
  tri: r => [[0,-r],[r*0.87,r*0.5],[-r*0.87,r*0.5]],
  sq: r => [[-r*0.8,-r*0.8],[r*0.8,-r*0.8],[r*0.8,r*0.8],[-r*0.8,r*0.8]],
  pent: r => [0,1,2,3,4].map(i=>[r*Math.sin(i*2*Math.PI/5), -r*Math.cos(i*2*Math.PI/5)]),
  hex: r => [0,1,2,3,4,5].map(i=>[r*Math.cos(i*Math.PI/3-Math.PI/6), r*Math.sin(i*Math.PI/3-Math.PI/6)]),
  dia: r => [[0,-r],[r*0.7,0],[0,r],[-r*0.7,0]]
};
let hatchSeq=0;
function drawShapeInto(g, spec, unit){
  // spec: {s,f,z,r,n,in} — draws n copies laid out in a small grid
  const n = spec.n||1;
  const size = { s:0.34, m:0.5, l:0.66 }[spec.z||"m"]*unit;
  const cols = n<=1?1 : n<=4?2 : 3;
  const rows = Math.ceil(n/cols);
  const cell = n===1 ? 0 : Math.min(unit*1.1/cols, unit*1.1/rows);
  const r0 = n===1 ? size : Math.min(size, cell*0.42);
  for(let i=0;i<n;i++){
    const cx = n===1?0:(i%cols - (cols-1)/2)*cell;
    const cy = n===1?0:(Math.floor(i/cols) - (rows-1)/2)*cell;
    const gg = document.createElementNS(SVGNS,"g");
    gg.setAttribute("transform",`translate(${cx},${cy}) rotate(${spec.r||0})`);
    let node;
    if (spec.s==="cir"){ node=document.createElementNS(SVGNS,"circle"); node.setAttribute("r",r0*0.85); }
    else { node=document.createElementNS(SVGNS,"polygon"); node.setAttribute("points", SHAPE_PTS[spec.s](r0).map(p=>p.join(",")).join(" ")); }
    const f=spec.f||"out";
    node.setAttribute("stroke","#31301f"); node.setAttribute("stroke-width","2"); node.setAttribute("fill","none");
    if (f==="sol") node.setAttribute("fill","#31301f");
    if (f==="hat"){
      const pid="h"+(hatchSeq++);
      const defs=document.createElementNS(SVGNS,"defs");
      defs.innerHTML=`<pattern id="${pid}" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="6" stroke="#31301f" stroke-width="1.6"/></pattern>`;
      gg.appendChild(defs); node.setAttribute("fill",`url(#${pid})`);
    }
    if (f==="half"){
      const pid="hf"+(hatchSeq++);
      const defs=document.createElementNS(SVGNS,"defs");
      defs.innerHTML=`<linearGradient id="${pid}" x1="0" y1="0" x2="0" y2="1"><stop offset="50%" stop-color="#31301f"/><stop offset="50%" stop-color="transparent"/></linearGradient>`;
      gg.appendChild(defs); node.setAttribute("fill",`url(#${pid})`);
    }
    gg.appendChild(node);
    if (spec.in && spec.in!=="none"){
      const ir=r0*0.34, inner=document.createElementNS(SVGNS,"g");
      const mk = {
        dot: `<circle r="${ir*0.7}" fill="#31301f"/>`,
        x: `<line x1="${-ir}" y1="${-ir}" x2="${ir}" y2="${ir}" stroke="#31301f" stroke-width="2"/><line x1="${ir}" y1="${-ir}" x2="${-ir}" y2="${ir}" stroke="#31301f" stroke-width="2"/>`,
        bar: `<line x1="${-ir}" y1="0" x2="${ir}" y2="0" stroke="#31301f" stroke-width="2.4"/>`,
        star: `<path d="M0 ${-ir} L${ir*0.3} ${-ir*0.3} L${ir} 0 L${ir*0.3} ${ir*0.3} L0 ${ir} L${-ir*0.3} ${ir*0.3} L${-ir} 0 L${-ir*0.3} ${-ir*0.3} Z" fill="#31301f"/>`,
        dia: `<polygon points="0,${-ir} ${ir*0.75},0 0,${ir} ${-ir*0.75},0" fill="none" stroke="#31301f" stroke-width="2"/>`,
        ring: `<circle r="${ir*0.8}" fill="none" stroke="#31301f" stroke-width="2"/>`
      }[spec.in];
      inner.innerHTML = mk || "";
      gg.appendChild(inner);
    }
    g.appendChild(gg);
  }
}
function renderCell(specArr, px){ // matrix cell (or option): array of overlaid element specs
  const s = svgEl(px,px,`${-px/2} ${-px/2} ${px} ${px}`);
  s.classList.add("svgcell");
  if (specArr === null){ const t=document.createElementNS(SVGNS,"text");
    t.setAttribute("text-anchor","middle"); t.setAttribute("dy","10"); t.setAttribute("fill","#8a8368"); t.setAttribute("font-size","30"); t.textContent="?";
    s.appendChild(t); return s; }
  const g=document.createElementNS(SVGNS,"g");
  if (specArr.length===1) drawShapeInto(g, specArr[0], px*0.42);
  else {
    // overlay: draw first outer shape once, then all inner marks side-by-side inside
    const outer = {...specArr[0], in:"none"};
    drawShapeInto(g, outer, px*0.42);
    specArr.forEach((sp,i)=>{
      const gg=document.createElementNS(SVGNS,"g");
      const off=(i-(specArr.length-1)/2)*px*0.18;
      gg.setAttribute("transform",`translate(${off},0)`);
      const ir=px*0.09;
      const mk={dot:`<circle r="${ir*0.7}" fill="#31301f"/>`,
        x:`<line x1="${-ir}" y1="${-ir}" x2="${ir}" y2="${ir}" stroke="#31301f" stroke-width="2"/><line x1="${ir}" y1="${-ir}" x2="${-ir}" y2="${ir}" stroke="#31301f" stroke-width="2"/>`,
        bar:`<line x1="${-ir}" y1="0" x2="${ir}" y2="0" stroke="#31301f" stroke-width="2.4"/>`,
        star:`<path d="M0 ${-ir} L${ir*0.3} ${-ir*0.3} L${ir} 0 L${ir*0.3} ${ir*0.3} L0 ${ir} L${-ir*0.3} ${ir*0.3} L${-ir} 0 L${-ir*0.3} ${-ir*0.3} Z" fill="#31301f"/>`,
        dia:`<polygon points="0,${-ir} ${ir*0.75},0 0,${ir} ${-ir*0.75},0" fill="none" stroke="#31301f" stroke-width="2"/>`,
        ring:`<circle r="${ir*0.8}" fill="none" stroke="#31301f" stroke-width="2"/>`}[sp.in]||"";
      gg.innerHTML=mk;
      g.appendChild(gg);
    });
  }
  s.appendChild(g);
  return s;
}
function renderGlyph(glyph, px){ // PA glyph {o,i,r}
  const s=svgEl(px,px,`${-px/2} ${-px/2} ${px} ${px}`); s.classList.add("svgcell");
  const g=document.createElementNS(SVGNS,"g");
  drawShapeInto(g,{s:glyph.o,f:"out",z:"l",r:glyph.r,in:glyph.i},px*0.42);
  s.appendChild(g); return s;
}
function renderPolyomino(cells, px, angle, mirrored){
  const s=svgEl(px,px,`${-px/2} ${-px/2} ${px} ${px}`); s.classList.add("svgcell");
  const xs=cells.map(c=>c[0]), ys=cells.map(c=>c[1]);
  const w=Math.max(...xs)-Math.min(...xs)+1, h=Math.max(...ys)-Math.min(...ys)+1;
  const u=Math.min(px*0.62/Math.max(w,h)/1.0, px*0.16);
  const cx=(Math.min(...xs)+Math.max(...xs)+1)/2, cy=(Math.min(...ys)+Math.max(...ys)+1)/2;
  const g=document.createElementNS(SVGNS,"g");
  g.setAttribute("transform",`rotate(${angle||0}) scale(${mirrored?-1:1},1)`);
  for(const [x,y] of cells){
    const r=document.createElementNS(SVGNS,"rect");
    r.setAttribute("x",(x-cx)*u); r.setAttribute("y",(y-cy)*u);
    r.setAttribute("width",u); r.setAttribute("height",u);
    r.setAttribute("fill","#5f6f3d"); r.setAttribute("stroke","#ffffff"); r.setAttribute("stroke-width","1.4");
    g.appendChild(r);
  }
  s.appendChild(g); return s;
}
function renderFoldStep(step, px){
  const s=svgEl(px,px,`0 0 ${px} ${px}`); s.classList.add("svgcell");
  const m=px*0.14, sc=px-2*m;
  const P=(p)=>[m+p[0]*sc, m+(1-p[1])*sc];
  const poly=document.createElementNS(SVGNS,"polygon");
  poly.setAttribute("points", step.outline.map(p=>P(p).join(",")).join(" "));
  poly.setAttribute("fill","#eef0e2"); poly.setAttribute("stroke","#8a8368"); poly.setAttribute("stroke-width","1.6");
  s.appendChild(poly);
  if (step.line){
    const l=document.createElementNS(SVGNS,"line");
    const [a,b]=step.line.map(P);
    l.setAttribute("x1",a[0]); l.setAttribute("y1",a[1]); l.setAttribute("x2",b[0]); l.setAttribute("y2",b[1]);
    l.setAttribute("stroke","#a97e12"); l.setAttribute("stroke-width","1.6"); l.setAttribute("stroke-dasharray","5 4");
    s.appendChild(l);
  }
  if (step.arrow){
    const [a,b]=step.arrow.map(P);
    const ar=document.createElementNS(SVGNS,"g");
    const dx=b[0]-a[0], dy=b[1]-a[1], L=Math.hypot(dx,dy), ux=dx/L, uy=dy/L;
    ar.innerHTML=`<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="#4c5a30" stroke-width="2"/>
      <polygon points="${b[0]},${b[1]} ${b[0]-10*ux+5*uy},${b[1]-10*uy-5*ux} ${b[0]-10*ux-5*uy},${b[1]-10*uy+5*ux}" fill="#4c5a30"/>`;
    s.appendChild(ar);
  }
  if (step.punches){
    for(const p of step.punches){
      const c=document.createElementNS(SVGNS,"circle");
      const q=P(p); c.setAttribute("cx",q[0]); c.setAttribute("cy",q[1]); c.setAttribute("r",px*0.035);
      c.setAttribute("fill","#faf7f0"); c.setAttribute("stroke","#31301f"); c.setAttribute("stroke-width","1.6");
      s.appendChild(c);
    }
  }
  return s;
}
function renderDotPattern(pts, px){
  const s=svgEl(px,px,`0 0 ${px} ${px}`); s.classList.add("svgcell");
  const m=px*0.12, sc=px-2*m;
  const sq=document.createElementNS(SVGNS,"rect");
  sq.setAttribute("x",m); sq.setAttribute("y",m); sq.setAttribute("width",sc); sq.setAttribute("height",sc);
  sq.setAttribute("fill","none"); sq.setAttribute("stroke","#8a8368"); sq.setAttribute("stroke-width","1.4");
  s.appendChild(sq);
  for(const p of pts){
    const c=document.createElementNS(SVGNS,"circle");
    c.setAttribute("cx",m+p[0]*sc); c.setAttribute("cy",m+(1-p[1])*sc); c.setAttribute("r",px*0.032);
    c.setAttribute("fill","#faf7f0"); c.setAttribute("stroke","#31301f"); c.setAttribute("stroke-width","1.6");
    s.appendChild(c);
  }
  return s;
}
function renderSymbol(path, px, color){
  const s=svgEl(px,px,`-10 -10 20 20`);
  const p=document.createElementNS(SVGNS,"path");
  p.setAttribute("d",path); p.setAttribute("fill","none");
  p.setAttribute("stroke",color||"#31301f"); p.setAttribute("stroke-width","1.8"); p.setAttribute("stroke-linecap","round");
  s.appendChild(p); return s;
}

/* ---------------- form selection (random from banks) ---------------- */
function buildForm(){
  const F = {};
  // stage 1: fill slots (type,tier,count) then order easy→medium→hard, shuffled within tier
  const bank = BAT.items.stage1.bank;
  const chosen = [];
  for (const [type,tier,count] of BAT.items.stage1.slots){
    const pool = bank.filter(i=>i.type===type && i.tier===tier && !chosen.includes(i.id));
    pickN(pool,count).forEach(i=>chosen.push(i.id));
  }
  const tierOrd = {e:0,m:1,h:2};
  const items1 = chosen.map(id=>bank.find(i=>i.id===id));
  F.stage1 = [].concat(...["e","m","h"].map(t=>shuffle(items1.filter(i=>i.tier===t)))).map(i=>i.id);
  // stage 2: pick 1 candidate per slot
  F.bwd = BAT.items.stage2.backward.trials.map(t=>pickN(t.candidates,1)[0].id);
  F.osp = BAT.items.stage2.opspan.trials.map(t=>pickN(t.candidates,1)[0].id);
  // stage 4: 12 of 20 pairs
  F.pairs = pickN(BAT.items.stage4.pairs, BAT.items.stage4.select).map(p=>p.id);
  // stage 5: 8 rotation (non-spare) + 4 folding (prefer difficulty spread), spares excluded in v1 form
  F.rot = BAT.items.stage5.rotation.trials.filter(t=>!t.spare).map(t=>t.id);
  F.fold = pickN(BAT.items.stage5.folding.items, 4).map(f=>f.id);
  // stage 6
  const cbank = BAT.items.stage6.comparison.bank;
  F.cmp = [].concat(...["close","med","far"].map(b=>pickN(cbank.filter(p=>p.bin===b), BAT.items.stage6.comparison.per_bin))).map(p=>p.id);
  F.cmp = shuffle(F.cmp);
  F.nle = pickN(BAT.items.stage6.numberline.bank, BAT.items.stage6.numberline.scored);
  F.est = pickN(BAT.items.stage6.estimation.bank, BAT.items.stage6.estimation.scored).map(e=>e.id);
  // stage 8: 6 of primary pool, distinct archetypes
  const cpool = shuffle(BAT.items.stage8.primary_pool.map(id=>BAT.items.stage8.bank.find(b=>b.id===id)));
  const used = new Set(); const sel=[];
  for (const it of cpool){ if (sel.length<BAT.items.stage8.scored && !used.has(it.archetype)){ sel.push(it.id); used.add(it.archetype);} }
  for (const it of cpool){ if (sel.length<BAT.items.stage8.scored && !sel.includes(it.id)) sel.push(it.id); }
  F.crt = sel;
  return F;
}

/* ---------- Stage 1 · Reasoning (A1) ---------- */
function stemForItem(it){
  if (it.type==="series") return `<div class="prompt">What comes next?</div><div class="centerc" style="font-size:30px;letter-spacing:6px;font-weight:600">${it.seq.map(esc).join(",&nbsp; ")}, <span style="color:var(--acc)">?</span></div>`;
  if (it.type==="analogy") return `<div class="prompt">Complete the analogy</div><div class="centerc" style="font-size:24px;font-weight:600">${esc(it.stem[0])} : ${esc(it.stem[1])} &nbsp;::&nbsp; ${esc(it.stem[2])} : <span style="color:var(--acc)">?</span></div>`;
  if (it.type==="oddoneout") return `<div class="prompt">Which one does not belong?</div>`;
  return "";
}
async function runDiscreteItem(it, stageKey, opts){
  // opts: {deadline, confidence, svgKind, feedback, extraTopHTML}
  return new Promise(resolve=>{
    const c=el("div","card");
    c.innerHTML = timerHTML + (opts.extraTopHTML||"");
    if (it.type==="matrix"){
      c.insertAdjacentHTML("beforeend",`<div class="prompt">Which tile completes the pattern?</div>`);
      const grid=el("div"); grid.style.cssText="display:grid;grid-template-columns:repeat(3,86px);gap:6px;justify-content:center;margin:10px 0";
      it.grid.forEach(cell=>grid.appendChild(renderCell(cell,86)));
      c.appendChild(grid);
    } else c.insertAdjacentHTML("beforeend", stemForItem(it));
    const optBox=el("div", it.type==="matrix"?"opts":"opts");
    c.appendChild(optBox);
    const skiprow=el("div","skiprow"); const skipBtn=el("button","btn ghost","skip →"); skiprow.appendChild(skipBtn); c.appendChild(skiprow);
    screen(c);
    const t0=now(); let done=false;
    const finish=async (pick, timeout, skip)=>{
      if(done)return; done=true; stopTimer();
      const rt=now()-t0;
      const correct = !timeout && !skip && pick===it.ans;
      let conf=null;
      if (opts.feedback){ // practice
        const nodes=optBox.children;
        if(!timeout && !skip){ nodes[pick].classList.add(correct?"correct":"wrong"); }
        if(!correct) nodes[it.ans].classList.add("correct");
        await sleep(900);
      } else if (opts.confidence && !timeout && !skip){
        conf=await askConfidence();
      }
      if (skip && !opts.feedback) S.skips++;
      logItem({stage:stageKey,id:it.id,type:it.type,difficulty:it.difficulty||null,practice:!!opts.feedback,
        pick:(timeout||skip)?null:pick, correct, rt, conf, timeout:!!timeout, skip:!!skip});
      resolve();
    };
    renderOptions(optBox, it.options, (idx)=>finish(idx,false,false), it.type==="matrix"?"cell":null);
    skipBtn.onclick=()=>finish(null,false,true);
    startTimer(opts.deadline, ()=>finish(null,true,false));
  });
}

/* ---------- Stage 2 · Memory span (A2) ---------- */
async function showDigits(seq, onMs, offMs){
  const c=el("div","card"); c.innerHTML=`<div class="stim"><div class="bigdigit" id="dg"></div></div>`;
  screen(c); const dg=$("#dg");
  await sleep(500);
  for (const d of seq){ dg.textContent=d; await sleep(onMs); dg.textContent=""; await sleep(offMs); }
}
function keypadRecall(len, title){
  return new Promise(resolve=>{
    const c=el("div","card centerc");
    c.innerHTML=`<div class="prompt">${title}</div><div class="recallline" id="rl"></div><div class="tiny">${len} digits</div>`;
    const kp=el("div","keypad");
    const entered=[];
    const rl=()=>$("#rl").textContent=entered.join(" ");
    [1,2,3,4,5,6,7,8,9].forEach(d=>{ const b=el("div","opt",String(d)); b.onclick=()=>{ if(entered.length<len){entered.push(d); rl();} }; kp.appendChild(b); });
    const back=el("div","opt","⌫"); back.onclick=()=>{entered.pop(); rl();}; kp.appendChild(back);
    const zero=el("div","opt","·"); zero.style.opacity=".25"; kp.appendChild(zero);
    const ok=el("div","opt","✓"); ok.style.background="#e9f2ec"; ok.onclick=()=>{ if(entered.length===len) resolve(entered.slice()); };
    kp.appendChild(ok);
    c.appendChild(kp); screen(c);
  });
}
async function stSpan(){
  setStage("span","Memory span · 3 of 11");
  const cfg=BAT.stages[2];
  const intro=el("div","card centerc");
  intro.innerHTML=`<h2>Part 2 · Memory span</h2><p class="muted"><b>Backward digits:</b> digits appear one at a time — enter them in <b>reverse order</b>.<br>Then <b>letter juggling:</b> solve quick checks while remembering letters in order.<br>No pen &amp; paper. 2 practice rounds first.</p><div class="btnrow"><button class="btn" id="go">Start practice</button></div>`;
  screen(intro); await new Promise(r=>$("#go").onclick=r);
  // backward practice
  for (const p of BAT.items.stage2.backward.practice){
    await showDigits(p.seq,cfg.digit_on_ms,cfg.digit_off_ms);
    const got=await keypadRecall(p.seq.length,"Enter in REVERSE order");
    const want=p.seq.slice().reverse();
    const okAll=got.every((d,i)=>d===want[i]);
    const fb=el("div","card centerc"); fb.innerHTML=`<div class="feedback" style="color:${okAll?"var(--ok)":"var(--bad)"}">${okAll?"Correct!":"Answer was: "+want.join(" ")}</div>`;
    screen(fb); await sleep(1100);
  }
  // backward scored
  const bt=BAT.items.stage2.backward.trials;
  for (let i=0;i<bt.length;i++){
    const cand=bt[i].candidates.find(x=>x.id===S.form.bwd[i]);
    const head=el("div","card centerc"); head.innerHTML=`<div class="muted">Round ${i+1} of ${bt.length} — ${bt[i].size} digits</div>`; screen(head); await sleep(900);
    await showDigits(cand.seq,cfg.digit_on_ms,cfg.digit_off_ms);
    const t0=now();
    const got=await keypadRecall(cand.seq.length,"Enter in REVERSE order");
    const rt=now()-t0;
    const want=cand.seq.slice().reverse();
    const posCorrect=got.filter((d,idx)=>d===want[idx]).length;
    const conf=await askConfidence();
    S.span.bwd.push({id:cand.id,size:bt[i].size,resp:got,want,posCorrect,unit:posCorrect/bt[i].size,rt,conf});
  }
  // opspan practice + scored
  const og=BAT.items.stage2.opspan;
  const runOsp=async (trial,practice)=>{
    let verifyOK=0;
    for (const elt of trial.elements){
      const vc=el("div","card centerc");
      vc.innerHTML=timerHTML+`<div class="prompt">Is this correct?</div><div style="font-size:34px;font-weight:700;margin:8px 0">${esc(elt.eq)} = ${elt.shown}</div><div class="btnrow"><button class="btn sec" id="yes" style="min-width:110px">Yes</button><button class="btn sec" id="no" style="min-width:110px">No</button></div>`;
      screen(vc);
      const v=await new Promise(res=>{ let d=false;
        $("#yes").onclick=()=>{if(!d){d=true;stopTimer();res(true);}};
        $("#no").onclick=()=>{if(!d){d=true;stopTimer();res(false);}};
        startTimer(cfg.verify_deadline_ms,()=>{if(!d){d=true;res(null);}}); });
      if (v!==null && v===elt.truth) verifyOK++;
      const lc=el("div","card"); lc.innerHTML=`<div class="stim"><div class="bigdigit" style="font-size:80px">${elt.letter}</div></div>`;
      screen(lc); await sleep(800);
    }
    // recall via letter grid
    const rec=await new Promise(resolve=>{
      const c=el("div","card centerc");
      c.innerHTML=`<div class="prompt">Tap the letters in the order shown</div><div class="recallline" id="rl"></div><div class="tiny">${trial.size} letters</div>`;

      const rl=()=>$("#rl").textContent=got.join(" ");
      og.letterGrid.forEach(L=>{ const b=el("div","opt",L); b.onclick=()=>{if(got.length<trial.size){got.push(L); rl();}}; gridEl.appendChild(b); });
      const back=el("div","opt","⌫"); back.onclick=()=>{got.pop(); rl();}; gridEl.appendChild(back);
      const ok=el("div","opt","✓"); ok.style.background="#e9f2ec"; ok.onclick=()=>{if(got.length===trial.size) resolve(got.slice());};
      gridEl.appendChild(ok);
      c.appendChild(gridEl); screen(c);
    });
    const want=trial.elements.map(e=>e.letter);
    const posCorrect=rec.filter((L,i)=>L===want[i]).length;
    if (practice){
      const okAll=posCorrect===trial.size;
      const fb=el("div","card centerc"); fb.innerHTML=`<div class="feedback" style="color:${okAll?"var(--ok)":"var(--bad)"}">${okAll?"Correct!":"Order was: "+want.join(" ")}</div>`;
      screen(fb); await sleep(1100); return;
    }
    const conf=await askConfidence();
    S.span.osp.push({id:trial.id,size:trial.size,resp:rec,want,posCorrect,unit:posCorrect/trial.size,verifyAcc:verifyOK/trial.size,conf});
  };
  const oi=el("div","card centerc");
  oi.innerHTML=`<h3>Letter juggling</h3><p class="muted">Answer each quick check (Yes/No), remember each letter that follows. Then tap the letters in order. 1 practice round.</p><div class="btnrow"><button class="btn" id="go">Practice</button></div>`;
  screen(oi); await new Promise(r=>$("#go").onclick=r);
  for (const p of og.practice) await runOsp(p,true);
  const oi2=el("div","card centerc"); oi2.innerHTML=`<h3>Scored rounds — keep the checks accurate (they count).</h3><div class="btnrow"><button class="btn" id="go">Go</button></div>`;
  screen(oi2); await new Promise(r=>$("#go").onclick=r);
  for (let i=0;i<og.trials.length;i++){
    const cand=og.trials[i].candidates.find(x=>x.id===S.form.osp[i]);
    await runOsp(cand,false);
  }
  endStage("span"); stSprint();
}

/* ---------- Stage 3 · Symbol sprint (A3) ---------- */
async function stSprint(){
  setStage("sprint","Symbol sprint · 4 of 11");
  const cfg=BAT.stages[3], sy=BAT.items.stage3;
  const intro=el("div","card centerc");
  intro.innerHTML=`<h2>Part 3 · Symbol sprint</h2><p class="muted">The key at the top maps each symbol to a digit. A <b>symbol</b> appears — tap its matching <b>digit</b> as fast as you can (keys 1–${sy.mapping_digits.length} work too). ${cfg.practice_s}s practice, then one ${cfg.run_s}s sprint.</p><div class="btnrow"><button class="btn" id="go">Practice</button></div>`;
  screen(intro); await new Promise(r=>$("#go").onclick=r);
  // Direction: symbol → digit (NIH-Toolbox / TestMyBrain style). The digit pad is
  // fixed, but the stimulus is a symbol, so position cannot be inferred without
  // doing the symbol→digit lookup — blocks the digit=position shortcut.
  const runBlock=(seconds,practice)=>new Promise(resolve=>{
    const c=el("div","card centerc");
    const map=el("div","maprow");
    sy.mapping_digits.forEach((d,i)=>{ const m=el("div","mapcell");
      m.appendChild(renderSymbol(sy.symbols[i].path,44)); m.appendChild(el("div","d",String(d))); map.appendChild(m); });
    c.appendChild(map);
    c.insertAdjacentHTML("beforeend",`<div id="itemTimer"><div id="itemTimerBar"></div></div><div class="stim" id="stimSym"></div><div class="feedback" id="fb"></div>`);
    const btns=el("div","symbtns");
    sy.mapping_digits.forEach((d,i)=>{ const b=el("div","opt",String(d));
      b.style.cssText="font-size:30px;font-weight:700;padding:14px 0"; b.onclick=()=>respond(i); btns.appendChild(b); });
    c.appendChild(btns); screen(c);
    let cur=null,t0=0,lastD=-1,alive=true;
    const log=practice?S.sprint.practice:S.sprint.run;
    const stim=$("#stimSym");
    const next=()=>{ let d; do{ d=ri(sy.mapping_digits.length);}while(d===lastD); lastD=d; cur=d;
      stim.innerHTML=""; stim.appendChild(renderSymbol(sy.symbols[d].path,120)); t0=now(); };
    const respond=(i)=>{ if(!alive||cur===null)return;
      const ok=i===cur; log.push({digit:sy.mapping_digits[cur],pick:i,correct:ok,rt:now()-t0,t:now()});
      if(practice){ const f=$("#fb"); f.textContent=ok?"✓":"✗ that was "+sy.mapping_digits[cur]; f.style.color=ok?"var(--ok)":"var(--bad)"; }
      next(); };
    const keyH=(e)=>{ const k=parseInt(e.key,10); if(k>=1&&k<=sy.mapping_digits.length){ e.preventDefault(); respond(sy.mapping_digits.indexOf(k)); } };
    document.addEventListener("keydown",keyH);
    next();
    startTimer(seconds*1000, ()=>{ alive=false; document.removeEventListener("keydown",keyH); resolve(); });
  });
  await runBlock(cfg.practice_s,true);
  const mid=el("div","card centerc"); mid.innerHTML=`<h3>Sprint — ${cfg.run_s} seconds. Fast <i>and</i> accurate.</h3><div class="btnrow"><button class="btn" id="go">Start sprint</button></div>`;
  screen(mid); await new Promise(r=>$("#go").onclick=r);

/* ---------- Stage 7 · SART (A5) ---------- */
function genSartSeq(n,nogoCount,nogoDigit){
  const pos=new Set();
  while(pos.size<nogoCount){ const p=2+ri(n-4); if(!pos.has(p-1)&&!pos.has(p)&&!pos.has(p+1)) pos.add(p); }
  const seq=[]; let last=-1;
  for(let i=0;i<n;i++){
    if(pos.has(i)){ seq.push(nogoDigit); last=nogoDigit; continue; }
    let d; do{ d=1+ri(9); }while(d===nogoDigit||d===last);
    seq.push(d); last=d;
  }
  return seq;
}
async function stSart(){
  setStage("sart","Focus · 8 of 11");
  const cfg=BAT.stages[7];
  const intro=el("div","card centerc");
  intro.innerHTML=`<h2>Part 7 · Focus</h2><p class="muted">Digits appear one after another. <b>Tap for every digit EXCEPT ${cfg.nogo_digit}.</b> When you see ${cfg.nogo_digit} — hold back. This measures steady focus, not speed. ${cfg.practice} practice trials first.</p><div class="btnrow"><button class="btn" id="go">Practice</button></div>`;
  screen(intro); await new Promise(r=>$("#go").onclick=r);
  const runBlock=async(nTrials,nNogo,practice)=>{
    const seq=genSartSeq(nTrials,nNogo,cfg.nogo_digit);
    const c=el("div","card centerc");
    c.innerHTML=`<div class="stim" style="min-height:150px"><div class="bigdigit" id="dgt" style="font-size:110px"></div></div><div class="feedback" id="fb"></div><button class="btn" id="sartTap">TAP</button><div class="tiny" style="margin-top:8px">or press space</div>`;
    screen(c);
    const log=practice?S.sart.practice:S.sart.trials;
    const tapBtn=$("#sartTap"), dgt=$("#dgt"), fb=$("#fb");
    for(let i=0;i<seq.length;i++){
      const d=seq[i], nogo=d===cfg.nogo_digit;
      let responded=false, rt=null;
      const t0=now();
      const onTap=()=>{ if(!responded){responded=true; rt=now()-t0;
        if(practice){ fb.textContent=nogo?"✗ that was a "+cfg.nogo_digit:"✓"; fb.style.color=nogo?"var(--bad)":"var(--ok)"; } } };
      tapBtn.onclick=onTap;
      const keyH=(e)=>{ if(e.code==="Space"){e.preventDefault(); onTap();} };
      document.addEventListener("keydown",keyH);
      dgt.textContent=d;
      await sleep(cfg.stim_ms);
      dgt.textContent="·";
      await sleep(cfg.soa_ms-cfg.stim_ms);
      document.removeEventListener("keydown",keyH);
      if(practice&&!responded){ fb.textContent=nogo?"✓ held back":"missed"; fb.style.color=nogo?"var(--ok)":"var(--warn)"; }
      log.push({digit:d,nogo,responded,rt});
    }
  };
  await runBlock(cfg.practice,2,true);
  const mid=el("div","card centerc"); mid.innerHTML=`<h3>Scored block — ~3 minutes, stay with it.</h3><div class="btnrow"><button class="btn" id="go">Go</button></div>`;
  screen(mid); await new Promise(r=>$("#go").onclick=r);
  await runBlock(cfg.trials,cfg.nogo_count,false);
  endStage("sart"); stReflection();
}

/* ---------- Stage 9 · Pairs recall + recognition (A4 retrieval) ---------- */
async function stPairsRecall(){
  setStage("pairs_recall","Pairs · recall · 10 of 11");
  const cfg=BAT.stages[9];
  const chosen=S.pairs.selected.map(id=>BAT.items.stage4.pairs.find(p=>p.id===id));
  const intro=el("div","card centerc");
  intro.innerHTML=`<h2>Part 9 · Remember the pairs?</h2><p class="muted">Those symbol–word pairs from earlier. First pick the word for each symbol (no feedback now). Then: have you seen <i>exactly this pair</i> before?</p><div class="btnrow"><button class="btn" id="go">Go</button></div>`;
  screen(intro); await new Promise(r=>$("#go").onclick=r);
  for (const p of shuffle(chosen)){
    const others=pickN(chosen.filter(x=>x.id!==p.id),3).map(x=>x.word);
    const opts=shuffle([p.word,...others]); const ansIdx=opts.indexOf(p.word);
    await new Promise(resolve=>{
      const c=el("div","card centerc"); c.innerHTML=timerHTML;
      c.appendChild(renderGlyph(p.glyph,110));
      c.insertAdjacentHTML("beforeend",`<div class="prompt">= ?</div>`);
      const box=el("div","opts wide"); c.appendChild(box); screen(c);
      const t0=now(); let done=false;
      const fin=(idx,timeout)=>{ if(done)return; done=true; stopTimer();
        S.pairs.recall.push({id:p.id,correct:!timeout&&idx===ansIdx,rt:now()-t0,timeout:!!timeout}); resolve(); };
      renderOptions(box,opts,(idx)=>fin(idx,false));
      startTimer(cfg.recall_deadline_ms,()=>fin(null,true));
    });
  }
  // recognition: 8 intact + 8 recombined (derangement)
  const intact=pickN(chosen,BAT.items.stage9.recognition.intact);
  const rest=chosen.filter(p=>!intact.includes(p));
  const pool=rest.length>=BAT.items.stage9.recognition.recombined?rest:chosen;
  const rec=pickN(pool,BAT.items.stage9.recognition.recombined);
  const words=shuffle(rec.map(p=>p.word));
  const recombined=rec.map((p,i)=>{
    let w=words[i];
    if(w===p.word){ const j=(i+1)%rec.length; [words[i],words[j]]=[words[j],words[i]]; w=words[i]; }
    return {glyph:p.glyph, word:w, id:p.id};
  });
  const trials=shuffle([
    ...intact.map(p=>({glyph:p.glyph,word:p.word,intact:true,id:p.id})),
    ...recombined.map(p=>({glyph:p.glyph,word:p.word,intact:false,id:p.id}))
  ]);
  const mid=el("div","card centerc"); mid.innerHTML=`<h3>Was it exactly this pair? Yes / No — then how sure.</h3><div class="btnrow"><button class="btn" id="go">Go</button></div>`;
  screen(mid); await new Promise(r=>$("#go").onclick=r);
  for (const tr of trials){
    await new Promise(resolve=>{
      const c=el("div","card centerc"); c.innerHTML=timerHTML;
      const g=el("div","glyphbox"); g.appendChild(renderGlyph(tr.glyph,100)); g.appendChild(el("div","pairword",esc(tr.word)));
      c.appendChild(g);
      c.insertAdjacentHTML("beforeend",`<div class="prompt">Seen exactly this pair before?</div>`);
      const btns=el("div","btnrow");
      const y=el("button","btn sec","Yes"), n=el("button","btn sec","No");
      btns.appendChild(y); btns.appendChild(n); c.appendChild(btns); screen(c);
      const t0=now(); let done=false;
      const fin=async(saysYes,timeout)=>{
        if(done)return; done=true; stopTimer();
        let conf=null;
        if(!timeout) conf=await askConfidence();
        const correct=!timeout&&(saysYes===tr.intact);
        S.pairs.recog.push({id:tr.id,intact:tr.intact,saysYes:timeout?null:saysYes,correct,rt:now()-t0,conf,timeout:!!timeout});
        resolve();
      };
      y.onclick=()=>fin(true,false); n.onclick=()=>fin(false,false);
      startTimer(cfg.recog_deadline_ms,()=>fin(null,true));
    });
  }
  endStage("pairs_recall"); stSelfReport();
}

/* ---------- Stage 10 · Self-report ---------- */
async function stSelfReport(){
  setStage("selfreport","About you · 11 of 11");
  const st10=BAT.items.stage10;
  const c=el("div","card");
  c.innerHTML=`<h2>Part 10 · About you</h2><p class="muted">${esc(st10.framing)} A few minutes of honest statements — these shape how a tutor should work with you.</p>`;
  const form=el("div");
  for (const scaleKey of st10.order){
    const sc=st10.scales[scaleKey];
    const sec=el("div","scalesec");
    sec.appendChild(el("h3","",esc(sc.prompt||sc.name)));
    let items=shuffle(sc.items.map(it=>({...it,scale:scaleKey})));
    // inject checks at their host scale position
    for (const chk of st10.checks){
      if (chk.hostScale===scaleKey){
        const pos=Math.min(chk.position??items.length, items.length);
        items=items.slice(0,pos).concat([{id:chk.id,text:chk.text,check:true,scale:scaleKey}],items.slice(pos));
      }
    }
    if (sc.stems){
      // group by stem, keep stem headers
      const byStem={};
      items.forEach(it=>{ const k=it.stem||"_"; (byStem[k]=byStem[k]||[]).push(it); });
      for (const stemKey of Object.keys(sc.stems)){
        sec.appendChild(el("div","muted",`<i>${esc(sc.stems[stemKey])}</i>`));
        (byStem[stemKey]||[]).forEach(it=>sec.appendChild(likertRow(it,sc)));
      }
      (byStem["_"]||[]).forEach(it=>sec.appendChild(likertRow(it,sc)));
    } else {
      items.forEach(it=>sec.appendChild(likertRow(it,sc)));
    }
    form.appendChild(sec);
  }
  c.appendChild(form);
  const doneBtn=el("button","btn big","Finish & see my profile"); doneBtn.disabled=true;
  const missing=el("div","tiny centerc"); missing.style.marginTop="8px";
  const holder=el("div","btnrow"); holder.appendChild(doneBtn); c.appendChild(holder); c.appendChild(missing);
  screen(c);
  const total=form.querySelectorAll(".likert").length;
  const refresh=()=>{
    const answered=Object.keys(S.selfreport).length+Object.keys(S.checks).length;
    missing.textContent=answered<total?`${total-answered} statements left`:"";
    doneBtn.disabled=answered<total;
  };
  form.addEventListener("click",refresh);
  refresh();
  doneBtn.onclick=()=>{ endStage("selfreport"); S.finished=new Date(); showResults(); };
}
function likertRow(it,sc){
  const row=el("div","likert");
  row.appendChild(el("div","it",esc(it.text)));
  const lr=el("div","lrow");
  const n=sc.points;
  for(let v=1;v<=n;v++){
    const lab=(sc.anchors&&sc.anchors[v-1])||String(v);
    const b=el("div","lopt",`<b>${v}</b><br>${esc(lab||"")}`);
    b.onclick=()=>{
      lr.querySelectorAll(".lopt").forEach(x=>x.classList.remove("sel"));
      b.classList.add("sel");
      if(it.check) S.checks[it.id]=v; else S.selfreport[it.id]=v;
    };
    lr.appendChild(b);
  }
  row.appendChild(lr);
  return row;
}

/*SCORING-BEGIN*/
/* ============================================================
   SCORING ENGINE — pure functions (no DOM). Runs in browser & node.
   Pipeline per plan §3: raw metric → percentile (anchor interp)
   → band (master table) → guardrails. Exact formulas per spec.
   ============================================================ */
const MirrorScoring = (function(){

  // inverse standard-normal CDF (Acklam approximation)
  function qnorm(p){
    if (p<=0) p=1e-10; if (p>=1) p=1-1e-10;
    const a=[-3.969683028665376e+01,2.209460984245205e+02,-2.759285104469687e+02,1.383577518672690e+02,-3.066479806614716e+01,2.506628277459239e+00];
    const b=[-5.447609879822406e+01,1.615858368580409e+02,-1.556989798598866e+02,6.680131188771972e+01,-1.328068155288572e+01];
    const c=[-7.784894002430293e-03,-3.223964580411365e-01,-2.400758277161838e+00,-2.549732539343734e+00,4.374664141464968e+00,2.938163982698783e+00];
    const d=[7.784695709041462e-03,3.224671290700398e-01,2.445134137142996e+00,3.754408661907416e+00];
    const pl=0.02425;
    let q,r;
    if (p<pl){ q=Math.sqrt(-2*Math.log(p));
      return (((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1); }
    if (p<=1-pl){ q=p-0.5; r=q*q;
      return (((((a[0]*r+a[1])*r+a[2])*r+a[3])*r+a[4])*r+a[5])*q/(((((b[0]*r+b[1])*r+b[2])*r+b[3])*r+b[4])*r+1); }
    q=Math.sqrt(-2*Math.log(1-p));
    return -(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);
  }
  const mean=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:null;
  const sd=a=>{ if(a.length<2)return null; const m=mean(a); return Math.sqrt(a.reduce((s,x)=>s+(x-m)*(x-m),0)/(a.length-1)); };
  function pearson(xs,ys){
    const n=xs.length; if(n<3)return null;
    const mx=mean(xs),my=mean(ys);
    let sxy=0,sxx=0,syy=0;
    for(let i=0;i<n;i++){ sxy+=(xs[i]-mx)*(ys[i]-my); sxx+=(xs[i]-mx)**2; syy+=(ys[i]-my)**2; }
    if(sxx===0||syy===0)return null;
    return sxy/Math.sqrt(sxx*syy);
  }
  function rtClean(rts, cfg){
    const base=rts.filter(r=>r!=null && r>=cfg.min_ms && r<=cfg.max_ms);
    if(base.length<3) return base;
    const m=mean(base), s=sd(base)||0;
    return base.filter(r=>r<=m+cfg.sd_cut*s);
  }

  // anchor interpolation → percentile [1..99]; handles dir −1 (lower raw = better)
  const PCTS=[10,25,50,75,90];
  function percentileFrom(anchor, value){
    if (value==null || !isFinite(value)) return null;
    let pts=anchor.v.map((v,i)=>[v,PCTS[i]]);
    if (anchor.dir===-1) pts=pts.slice().reverse().map(([v,p])=>[v,100-p]); // ascending v, pct = 100−orig
    // pts now ascending in v; percentile increases with value for dir=1, and for dir=−1 we mapped p→100−p so it also increases; correct at end.
    let pct;
    if (value<=pts[0][0]){ const [x1,y1]=pts[0],[x2,y2]=pts[1]; pct=y1+(value-x1)*(y2-y1)/(x2-x1); }
    else if (value>=pts[4][0]){ const [x1,y1]=pts[3],[x2,y2]=pts[4]; pct=y2+(value-x2)*(y2-y1)/(x2-x1); }
    else { for(let i=0;i<4;i++){ const [x1,y1]=pts[i],[x2,y2]=pts[i+1];
      if(value>=x1&&value<=x2){ pct=y1+(value-x1)*(y2-y1)/(x2-x1); break; } } }
    if (anchor.dir===-1) pct=100-pct;
    return Math.min(99, Math.max(1, pct));
  }
  function bandFrom(pct, bands){
    if (pct==null) return null;
    for (const b of bands){ if (pct<=b.max) return b.band; }
    return 10;
  }

  function computeAll(S, BAT){
    const cfg=BAT.scoring, hyg=cfg.rt_hygiene, G=cfg.guardrails;
    const axes={}; const flagsOf={};
    const scored=S.items.filter(i=>!i.practice);
    const blur=(k)=>(S.blurs&&S.blurs[k])||0;
    const stageFlag=(k)=>blur(k)>G.blur_flag?["blur_flag"]:[];
    const device=S.deviceClass||"mouse";

    function makeAxis(code, raw, pct, grade, flags, subs, capNote){
      let band=bandFrom(pct, cfg.master_bands);
      if (capNote && band!==null && band>G.ceiling_cap){ band=G.ceiling_cap; flags=[...flags,"ceiling_retest_harder_form"]; }
      axes[code]={ raw, percentile: pct==null?null:Math.round(pct), band, grade, flags, subs: subs||null };
    }

    /* ---- A1 ---- */
    {
      const it=scored.filter(i=>i.stage==="reasoning");
      const n=it.length;
      const acc=n? it.filter(i=>i.correct).length/n : null;
      const fl=stageFlag("reasoning");
      makeAxis("A1", acc, acc==null?null:percentileFrom(cfg.anchors.A1,acc), "F", fl, {n}, acc!=null&&acc>=G.ceiling_acc);
    }
    /* ---- A2 ---- */
    {
      const b=S.span.bwd, o=S.span.osp;
      const uB=mean(b.map(t=>t.unit)), uO=mean(o.map(t=>t.unit));
      const raw=(uB!=null&&uO!=null)?(uB+uO)/2:(uB!=null?uB:uO);
      const fl=stageFlag("span");
      const vAcc=mean(o.map(t=>t.verifyAcc));
      if (vAcc!=null && vAcc<0.85) fl.push("opspan_processing_low");
      makeAxis("A2", raw, raw==null?null:percentileFrom(cfg.anchors.A2,raw), "F", fl, {backward_unit:uB, opspan_unit:uO, verify_acc:vAcc}, raw!=null&&raw>=G.ceiling_acc);
    }
    /* ---- A3 ---- */
    {
      const run=S.sprint.run;
      const nC=run.filter(r=>r.correct).length;
      const rate=run.length? nC/90 : null;
      const acc=run.length? nC/run.length : null;
      const fl=stageFlag("sprint");
      if (acc!=null && acc<G.a3_acc_flag) fl.push("speed_accuracy_tradeoff");
      if (device==="touch") fl.push("device_touch");
      // latency drift for E6
      let drift=null;
      if (run.length>=12){
        const third=Math.floor(run.length/3);
        const f=mean(rtClean(run.slice(0,third).map(r=>r.rt),hyg));
        const l=mean(rtClean(run.slice(-third).map(r=>r.rt),hyg));
        if (f&&l) drift=l/f;
      }
      makeAxis("A3", rate, rate==null?null:percentileFrom(cfg.anchors.A3,rate), "F", fl, {accuracy:acc, attempted:run.length, drift});
    }
    /* ---- A4 ---- */
    {
      const c2=S.pairs.cycle2, rc=S.pairs.recall, rg=S.pairs.recog;
      const imm=c2.length? c2.filter(x=>x.correct).length/c2.length*100 : null;
      const del=rc.length? rc.filter(x=>x.correct).length/rc.length*100 : null;
      const ret=(imm&&del!=null)? Math.min(1, del/imm) : null;
      let dpr=null, hits=null, fas=null;
      const sig=rg.filter(t=>t.intact&&t.saysYes!==null), noi=rg.filter(t=>!t.intact&&t.saysYes!==null);
      if (sig.length>=4&&noi.length>=4){
        const H=(sig.filter(t=>t.saysYes).length+0.5)/(sig.length+1);
        const FA=(noi.filter(t=>t.saysYes).length+0.5)/(noi.length+1);
        dpr=qnorm(H)-qnorm(FA); hits=H; fas=FA;
      }
      const subs={imm,ret,dpr};
      const ps=[["imm",imm],["ret",ret],["dpr",dpr]].map(([k,v])=>v==null?null:percentileFrom(cfg.anchors.A4.sub[k],v)).filter(p=>p!=null);
      const pct=ps.length?mean(ps):null;
      const fl=[...stageFlag("pairs_study"),...stageFlag("pairs_recall")];
      if (ps.length<3) fl.push("a4_partial_submetrics");
      makeAxis("A4", del==null?null:del/100, pct, "F", fl, {immediate_pct:imm, delayed_pct:del, retention:ret, dprime:dpr==null?null:Math.round(dpr*100)/100});
    }
    /* ---- A5 ---- */
    {
      const tr=S.sart.trials;
      const go=tr.filter(t=>!t.nogo), ng=tr.filter(t=>t.nogo);
      const rts=rtClean(go.filter(t=>t.responded).map(t=>t.rt),hyg);
      const cov=(rts.length>=10 && mean(rts))? (sd(rts)/mean(rts)) : null;
      const com=ng.length? ng.filter(t=>t.responded).length/ng.length : null;
      const omi=go.length? go.filter(t=>!t.responded).length/go.length : null;
      const fl=stageFlag("sart");
      if (omi!=null && omi>G.sart_omission_flag) fl.push("sart_disengaged");
      if (device==="touch") fl.push("device_touch");
      const pc=cov==null?null:percentileFrom(cfg.anchors.A5.sub.cov,cov);
      const pm=com==null?null:percentileFrom(cfg.anchors.A5.sub.com,com);
      const pct=(pc!=null&&pm!=null)?(2*pc+pm)/3:(pc??pm);
      makeAxis("A5", cov, pct, "S", fl, {rt_cov:cov==null?null:Math.round(cov*1000)/1000, commission_rate:com, omission_rate:omi});
    }
    /* ---- C1 ---- */
    {
      const cmp=scored.filter(i=>i.stage==="number"&&i.type==="comparison");
      const est=scored.filter(i=>i.stage==="number"&&i.type==="estimation");
      const cAcc=cmp.length? cmp.filter(i=>i.correct).length/cmp.length : null;
      const paes=S.nle.filter(n=>n.pae!=null).map(n=>n.pae);
      const pae=paes.length? mean(paes) : null;
      const eAcc=est.length? est.filter(i=>i.correct).length/est.length : null;
      const pc=cAcc==null?null:percentileFrom(cfg.anchors.C1.sub.cmp,cAcc);
      const pp=pae==null?null:percentileFrom(cfg.anchors.C1.sub.pae,pae);
      const pe=eAcc==null?null:percentileFrom(cfg.anchors.C1.sub.est,eAcc);
      const parts=[[pc,2],[pp,1],[pe,1]].filter(([p])=>p!=null);
      const pct=parts.length? parts.reduce((s,[p,w])=>s+p*w,0)/parts.reduce((s,[,w])=>s+w,0) : null;
      const nearLures=est.filter(i=>i.lure==="near").length;
      makeAxis("C1", cAcc, pct, "F", stageFlag("number"), {comparison_acc:cAcc, mean_pae:pae==null?null:Math.round(pae*100)/100, estimation_acc:eAcc, near_lure_errors:nearLures});
    }
    /* ---- C2 ---- */
    {
      const it=scored.filter(i=>i.stage==="spatial");
      const acc=it.length? it.filter(i=>i.correct).length/it.length : null;
      const rot=it.filter(i=>i.type==="rotation"&&i.correct&&i.rt!=null);
      let slope=null;
      if (rot.length>=5){ slope=pearson(rot.map(r=>r.angle),rot.map(r=>r.rt)); }
      makeAxis("C2", acc, acc==null?null:percentileFrom(cfg.anchors.C2,acc), "F", stageFlag("spatial"), {n:it.length, rt_angle_r:slope==null?null:Math.round(slope*100)/100}, acc!=null&&acc>=G.ceiling_acc);
    }
    /* ---- D1 ---- */
    {
      const crt=scored.filter(i=>i.stage==="reflection");
      const nRef=crt.filter(i=>i.cls==="reflective").length;
      const nLure=crt.filter(i=>i.cls==="lure").length;
      const com=axes.A5?axes.A5.subs.commission_rate:null;
      const p1=crt.length?percentileFrom(cfg.anchors.D1.sub.crt,nRef):null;
      const p2=com==null?null:percentileFrom(cfg.anchors.D1.sub.com,com);
      const pct=(p1!=null&&p2!=null)?(p1+p2)/2:(p1??p2);
      makeAxis("D1", nRef, pct, "S", stageFlag("reflection"), {reflective_of6:nRef, lure_rate:crt.length?Math.round(nLure/crt.length*100)/100:null, sart_commissions:com});
    }
    /* ---- D3 (layer) ---- */
    const judg=[];

    let checksPass=true;
    for (const c of checksDef){
      const v=S.checks[c.id];
      if (v==null){ checksPass=false; break; }
      if (c.passValue!=null && v!==c.passValue){ checksPass=false; break; }
      if (c.passMax!=null && v>c.passMax){ checksPass=false; break; }
    }
    const sc10=BAT.items.stage10.scales;
    const val=(id)=>S.selfreport[id];
    const scaleMean=(key)=>{
      const sc=sc10[key];
      const vs=sc.items.map(it=>{ let v=val(it.id); if(v==null)return null; if(it.reverse)v=(sc.points+1)-v; return v; }).filter(v=>v!=null);
      return vs.length===sc.items.length? mean(vs) : null;
    };

    if (checksPass){
      const e1=scaleMean("NGSE");
      makeAxis("E1", e1, e1==null?null:percentileFrom(cfg.anchors.E1,e1), "self-report", [], null);
      const e3=scaleMean("MINIIPIP_C");
      makeAxis("E3", e3, e3==null?null:percentileFrom(cfg.anchors.E3,e3), "self-report", [], null);
      const amas=sc10.AMAS.items.map(it=>val(it.id)).filter(v=>v!=null);
      const e5=amas.length===9? amas.reduce((a,b)=>a+b,0) : null;

      const parts=[];
      if (mslq!=null) parts.push([percentileFrom(cfg.anchors.D2.sub.mslq,mslq),0.4]);
      if (rtdif!=null) parts.push([percentileFrom(cfg.anchors.D2.sub.rtdif,rtdif),0.2]);
      if (pep!=null) parts.push([percentileFrom(cfg.anchors.D2.sub.pep,pep),0.2]);
      if (skq!=null) parts.push([percentileFrom(cfg.anchors.D2.sub.skq,skq),0.2]);
      const pct=parts.length? parts.reduce((s,[p,w])=>s+p*w,0)/parts.reduce((s,[,w])=>s+w,0) : null;
      const fl=[];
      if (!checksPass) fl.push("self_report_invalid_behavioural_only");
      if (rtdif==null&&pep==null) fl.push("telemetry_sparse");
      makeAxis("D2", mslq, pct, "S", fl, {mslq_mean:mslq, rt_difficulty_r:rtdif==null?null:Math.round(rtdif*100)/100, post_error_persistence:pep==null?null:Math.round(pep*100)/100, skip_quality:skq});

    {

      const drifts=[];
      if (axes.A3&&axes.A3.subs&&axes.A3.subs.drift) drifts.push(axes.A3.subs.drift-1);
      const go=S.sart.trials.filter(t=>!t.nogo&&t.responded);

      skips: S.skips,
      post_error_persistence: axes.D2.subs.post_error_persistence,
      rt_difficulty_r: axes.D2.subs.rt_difficulty_r };

    for (const code of sliderCodes){
      const a=axes[code];
      if (a && a.band!=null){ params[code]=a.band; }
      if (a) detail[code]={ raw:a.raw, percentile:a.percentile, grade:a.grade, flags:a.flags, ...(a.subs?{subs:a.subs}:{}), ...(code==="E5"&&a.flags.includes("riskFlag")?{riskFlag:true}:{}) };

    }
    if (axes.E2 && axes.E2.cls){ params.E2=axes.E2.cls; detail.E2={ rai:axes.E2.raw, subs:axes.E2.subs, grade:"self-report", flags:axes.E2.flags }; }

const GRADE_COLOR={ "F":"#5f6f3d", "S":"#a97e12", "self-report":"#7a6880" };
const GRADE_LABEL={ "F":"feedback-grade", "S":"screening-grade", "self-report":"self-report" };

function radarSVG(axes){
  const order=BAT.param_meta.order.filter(c=>axes[c]&&axes[c].band!=null);
  const n=order.length, CX=215, CY=220, R=152;
  const pt=(i,v)=>{ const a=i*2*Math.PI/n-Math.PI/2; return [CX+Math.cos(a)*R*v/10, CY+Math.sin(a)*R*v/10]; };
  const poly=(vfn)=>order.map((c,i)=>pt(i,vfn(c)).join(",")).join(" ");
  const pathOf=(vfn)=>"M "+order.map((c,i)=>pt(i,vfn(c)).join(" ")).join(" L ")+" Z";
  const dispBand=c=>c==="E5"? 10-axes[c].band : axes[c].band;
  let s=`<svg viewBox="0 0 430 450" width="100%" style="max-width:470px" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="rg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5f6f3d" stop-opacity=".34"/>
      <stop offset="100%" stop-color="#5f6f3d" stop-opacity=".10"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#4c5a30" flood-opacity="0.35"/>
    </filter>
  </defs>`;
  for (const r of [2.5,5,7.5,10])
    s+=`<polygon points="${poly(()=>r)}" fill="none" stroke="#e2dbc8" stroke-width="${r===5?1.6:0.9}"/>`;
  order.forEach((c,i)=>{
    const [x,y]=pt(i,10);
    const g=axes[c].grade;
    const dash=g==="S"?"5 4":(g==="self-report"?"2 4":"none");
    s+=`<line x1="${CX}" y1="${CY}" x2="${x}" y2="${y}" stroke="#d3cab2" stroke-width="1" ${dash!=="none"?`stroke-dasharray="${dash}"`:""}/>`;
  });
  // confidence band as a true annulus (evenodd), wider on S / self-report axes
  const hi=(c)=>Math.min(10,dispBand(c)+(axes[c].grade==="F"?0.75:1.5));
  const lo=(c)=>Math.max(0,dispBand(c)-(axes[c].grade==="F"?0.75:1.5));
  s+=`<path d="${pathOf(hi)} ${pathOf(lo)}" fill="#5f6f3d" fill-opacity=".08" fill-rule="evenodd"/>`;
  s+=`<polygon points="${poly(dispBand)}" fill="url(#rg)" stroke="#5f6f3d" stroke-width="2.4" stroke-linejoin="round" filter="url(#soft)"/>`;
  order.forEach((c,i)=>{
    const [x,y]=pt(i,dispBand(c));
    s+=`<circle cx="${x}" cy="${y}" r="4.4" fill="${GRADE_COLOR[axes[c].grade]}" stroke="#ffffff" stroke-width="1.8"/>`;
    const [lx,ly]=pt(i,12.15);
    const nm=c==="E5"?"Composure":c;
    s+=`<text x="${lx}" y="${ly-4}" text-anchor="middle" font-size="11.5" font-weight="700" fill="${GRADE_COLOR[axes[c].grade]}">${nm}</text>
        <text x="${lx}" y="${ly+9}" text-anchor="middle" font-size="10.5" fill="#8a8368">${dispBand(c)} / 10</text>`;
  });
  s+=`</svg>`;
  return s;
}
function biasGauge(d3v){

  <defs><linearGradient id="bg1" x1="0" x2="1">

  <rect x="22" y="38" width="${W-44}" height="9" rx="4.5" fill="none" stroke="#e2dbc8"/>

    for (const lk of leaks){
      const r=BAT.readouts[lk.code];
      const anxietyNote=(riskE5&&lk.code!=="E5")?` <span class="tiny">(read alongside the anxiety note above — address composure first)</span>`:"";
      body.insertAdjacentHTML("beforeend",`<div class="sumline leak"><b>▼ ${esc(r.name)} — band ${axes[lk.code].band}${lk.code==="E5"?" anxiety":""}</b>${esc(r.leak)}${anxietyNote}</div>`);
    }
    if (!leaks.length) body.insertAdjacentHTML("beforeend",`<div class="sumline">No axis sits below the midline — the profile is even. Use the lens toggle to stress-test it against your target exam.</div>`);
    body.insertAdjacentHTML("beforeend",`<div class="tiny">Lens re-weights deviations (JEE ×1.5 on A1 A2 C2 C1 D1 · NEET ×1.5 on A4 A3 D3 E5) before ranking. Bands are provisional-norm reads, not verdicts — every axis is trainable in strategy even where the trait is stable.</div>`);
  }
  sumCard.querySelector("#lensSel").onchange=e=>renderSummary(e.target.value);
  renderSummary("none");

  /* axis meters */
  const per=el("div","card");
  per.innerHTML=`<h3>Axis by axis</h3><div class="tiny" style="margin-bottom:6px">Each band with what it means for how you should study. Mid-line = age-typical (band 5).</div>`;
  for (const c of BAT.param_meta.order){
    const a=axes[c]; if(!a||a.band==null) continue;
    const r=BAT.readouts[c];
    const disp=c==="E5"?10-a.band:a.band;
    per.insertAdjacentHTML("beforeend",
      `<div class="axisrow">
        <span class="acode">${c}</span>
        <span class="aname">${esc(c==="E5"?"Composure (anxiety reversed)":r.name)}<span class="agrade" style="color:${GRADE_COLOR[a.grade]}">${GRADE_LABEL[a.grade]}${(a.flags||[]).includes("riskFlag")?" · risk flag":""}</span></span>
        <span class="meter"><span class="mid"></span><span class="fill" style="width:${disp*10}%"></span></span>
        <span class="aband">${disp}</span>
      </div>
      <div class="axisimp">${esc(bandText(c,a.band))}</div>`);
  }
  root.appendChild(per);

  /* detail table */
  const det=el("div","card");
  det.innerHTML=`<h3>Under the hood</h3><div class="tiny">Raw metrics, percentiles and validity flags — stored with your profile.</div>
  <table class="dettable"><tr><th>Axis</th><th>Raw</th><th>%ile</th><th>Band</th><th>Grade</th><th>Flags</th></tr>
  ${BAT.param_meta.order.map(c=>{ const a=axes[c]; if(!a)return "";
    return `<tr><td><b>${c}</b></td><td>${fmtRaw(c,a)}</td><td>${a.percentile??"—"}</td><td>${a.band??"omitted"}</td><td style="color:${GRADE_COLOR[a.grade]}">${a.grade}</td><td>${(a.flags||[]).map(f=>`<span class="flagchip">${esc(f)}</span>`).join("")||"—"}</td></tr>`; }).join("")}
  <tr><td><b>D3</b></td><td>bias ${d3v.bias_value??"—"} · γ ${d3v.gamma??"—"} · Brier ${d3v.brier??"—"}</td><td>${d3v.res_percentile??"—"}</td><td>${d3v.biasClass??"—"} / res ${d3v.res_band??"—"}</td><td>F bias · S res</td><td>${d3v.flags.map(f=>`<span class="flagchip">${esc(f)}</span>`).join("")||"—"}</td></tr>
  ${axes.E2?`<tr><td><b>E2</b></td><td>RAI ${axes.E2.raw??"—"}</td><td>—</td><td>${axes.E2.cls??"omitted"}</td><td style="color:${GRADE_COLOR["self-report"]}">self-report</td><td>${(axes.E2.flags||[]).map(f=>`<span class="flagchip">${esc(f)}</span>`).join("")||"—"}</td></tr>`:""}
  </table>
  <div class="tiny" style="margin-top:8px">Grades: F = feedback (~.80 reliability target) · S = screening (~.70, wider band) · self-report = single sitting, fakeable. Missing axes are omitted, never invented.</div>`;
  root.appendChild(det);

  /* export */
  const ex=el("div","card");
  ex.innerHTML=`<h3>Send this to your tutor setup</h3>
  <p class="muted">The profile matches <code>tutor.html</code>'s parameter schema exactly (<code>profile.params</code>).</p>
  <div class="btnrow" style="justify-content:flex-start">
    <button class="btn" id="dl">Download mirror_profile.json</button>
    <button class="btn sec" id="cp">Copy JSON</button>
    <button class="btn ghost" id="restart">New session</button>
  </div>
  <p class="tiny" id="cpmsg"></p>
  <p class="tiny">To use it: open <b>tutor.html</b> → set each parameter to the band shown here (or wire up its JSON import — the file's <code>params</code> object drops straight into <code>profile.params</code>). Keys: sliders 0–10, D3 {bias,res}, E2 profile class, E5 raw-direction (higher = more anxious).</p>`;
  root.appendChild(ex);

  screen(root);
  $("#dl").onclick=()=>{
    const blob=new Blob([JSON.stringify(profile,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="mirror_profile.json"; a.click();
  };
  $("#cp").onclick=async()=>{ try{ await navigator.clipboard.writeText(JSON.stringify(profile,null,2)); $("#cpmsg").textContent="Copied ✓"; }catch(e){ $("#cpmsg").textContent="Copy blocked — use Download instead."; } };
  $("#restart").onclick=()=>location.reload();
  try{ if(document.fullscreenElement) document.exitFullscreen(); }catch(e){}
}

/* ---------------- boot ---------------- */
stSetup();

</script>
</body>
</html>
